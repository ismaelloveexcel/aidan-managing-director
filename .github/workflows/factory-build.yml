name: Factory Build

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Project identifier used in BuildBrief"
        required: true
        type: string
      dry_run:
        description: "Run without side effects"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Trigger factory build
        env:
          FACTORY_BASE_URL: ${{ vars.FACTORY_BASE_URL }}
        run: |
          if [ -z "${FACTORY_BASE_URL}" ]; then
            echo "FACTORY_BASE_URL is not set. Configure repository or organization variable FACTORY_BASE_URL to point to a running factory API deployment." >&2
            exit 1
          fi

          python scripts/run_factory_build.py \
            --project-id "${{ inputs.project_id }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --api-base-url "${FACTORY_BASE_URL}"
