name: Scheduled Pipeline

on:
  schedule:
    # Run every 6 hours to check project health and trigger decisions.
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without side effects"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  pipeline-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate FACTORY_BASE_URL
        env:
          FACTORY_BASE_URL: ${{ vars.FACTORY_BASE_URL }}
        run: |
          if [ -z "$FACTORY_BASE_URL" ]; then
            echo "::warning::FACTORY_BASE_URL not set – pipeline check runs in diagnostic mode only"
          fi

      - name: Run scheduled pipeline check
        env:
          FACTORY_BASE_URL: ${{ vars.FACTORY_BASE_URL || '' }}
          APP_ENV: ${{ vars.APP_ENV || 'production' }}
        run: |
          python -c "
          import json, sys
          from app.core.dependencies import get_portfolio_intelligence_service

          intel = get_portfolio_intelligence_service()
          capacity = intel.operator_capacity()
          digest = intel.generate_daily_digest()
          ranked = intel.ranked_projects()

          cap_data = {
              'active_projects': capacity.active_projects,
              'builds_in_parallel': capacity.builds_in_parallel,
              'launches_this_week': capacity.launches_this_week,
              'should_hold': capacity.should_hold_new_projects,
              'reason': capacity.reason,
          }

          print('=== OPERATOR CAPACITY ===')
          print(json.dumps(cap_data, indent=2))

          print()
          print('=== DAILY DIGEST ===')
          for action in digest:
              print(f'  {action}')

          print()
          print('=== RANKED PROJECTS ===')
          for p in ranked[:5]:
              print(f'  {p.project_id}: health={p.health_score}, rec={p.recommendation}')

          if not ranked:
              print('  (no projects)')

          # Actionable decisions: flag projects needing attention
          for p in ranked:
              if p.recommendation == 'kill':
                  print(f'::warning::Project {p.project_id} recommended for KILL (health={p.health_score})')
              elif p.recommendation == 'scale':
                  print(f'::notice::Project {p.project_id} recommended for SCALE (health={p.health_score})')

          if capacity.should_hold_new_projects:
              print(f'::warning::Capacity limit reached: {capacity.reason}')
              sys.exit(0)

          print()
          print('=== PIPELINE CHECK COMPLETE ===')
          "
